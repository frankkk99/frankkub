<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Frank Creative — Immersive 3D Preview</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050505;color:#f4f1eb;font-family:system-ui,sans-serif}
    #boot{position:fixed;inset:0;z-index:999999;display:grid;place-items:center;background:#050505;transition:opacity .65s ease,visibility .65s ease}
    #boot.hide{opacity:0;visibility:hidden}
    .boot-box{width:min(78vw,420px)}
    .boot-title{display:flex;justify-content:space-between;gap:20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#aaa}
    .boot-line{height:1px;margin-top:15px;background:#242424;overflow:hidden}
    .boot-line::after{content:"";display:block;width:40%;height:100%;background:#fff;animation:load 1.1s ease-in-out infinite}
    @keyframes load{from{transform:translateX(-120%)}to{transform:translateX(350%)}}
    .boot-error{max-width:560px;padding:32px;line-height:1.7;text-align:center}.boot-error a{color:#fff}
  </style>
</head>
<body>
  <div id="boot">
    <div class="boot-box">
      <div class="boot-title"><span>Frank Creative</span><span>Loading depth</span></div>
      <div class="boot-line"></div>
    </div>
  </div>
  <script>
    (async()=>{
      const boot=document.getElementById('boot');
      try{
        const response=await fetch('/index.html',{cache:'no-store'});
        if(!response.ok) throw new Error('Unable to load portfolio');
        const html=await response.text();
        const doc=new DOMParser().parseFromString(html,'text/html');
        const scripts=[...doc.querySelectorAll('script')].map(s=>({src:s.src,type:s.type,text:s.textContent}));
        doc.querySelectorAll('script').forEach(s=>s.remove());

        [...doc.head.querySelectorAll('link[rel="stylesheet"],style')].forEach(node=>{
          const clone=node.cloneNode(true);
          if(clone.tagName==='LINK' && clone.getAttribute('href')){
            clone.href=new URL(clone.getAttribute('href'),location.href).href;
          }
          document.head.appendChild(clone);
        });

        const enhanceCss=document.createElement('link');
        enhanceCss.rel='stylesheet';
        enhanceCss.href='/assets/3d-enhance.css';
        document.head.appendChild(enhanceCss);

        document.documentElement.lang=doc.documentElement.lang||'th';
        document.body.className=doc.body.className;
        document.body.innerHTML=doc.body.innerHTML;

        for(const item of scripts){
          await new Promise((resolve,reject)=>{
            const s=document.createElement('script');
            if(item.type) s.type=item.type;
            if(item.src){
              s.src=item.src;
              s.onload=resolve;s.onerror=reject;
            }else{
              s.textContent=item.text;
              resolve();
            }
            document.body.appendChild(s);
          });
        }

        const enhanceJs=document.createElement('script');
        enhanceJs.src='/assets/3d-enhance.js';
        enhanceJs.onload=()=>{
          const overlay=document.createElement('div');
          overlay.id='boot';overlay.className='hide';
          document.body.appendChild(overlay);
          setTimeout(()=>overlay.remove(),800);
        };
        document.body.appendChild(enhanceJs);
      }catch(error){
        document.body.innerHTML=`<div id="boot"><div class="boot-error"><h1>3D preview could not start</h1><p>${error.message}</p><a href="/index.html">Open the standard portfolio</a></div></div>`;
      }
    })();
  </script>
</body>
</html>
